    <script>
      // Respect the OS-level color scheme preference. Default to dark when no
      // preference is reported (matches the historical look of this app).
      (function () {
        try {
          var mql = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)")
          if (!mql || !mql.matches) {
            document.documentElement.classList.add("dark")
          }
        } catch (_) {
          document.documentElement.classList.add("dark")
        }
      })()
    </script>
